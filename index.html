<style>
  :root {
    --bg: #EEF1F6; --ink: #16336E; --blue: #2B5BB7; --blue-soft: #D8E3F7;
    --board: #C7D4EA; --cell: #FFFFFF; --sun: #F2B23C;
    --bad: #C94F3D; --bad-bg: #F7DBD5; --ok-bg: #E3F2E8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'Nunito Sans', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 16px 12px 40px; }
  body.mobile .wrap { padding-bottom: 210px; }

  header { text-align: center; margin-bottom: 12px; }
  h1 { font-family: 'Yeseva One', serif; font-size: 30px; line-height: 1.1; margin: 0; font-weight: 400; }
  .sub { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--blue); text-transform: uppercase; margin-top: 2px; }

  .chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
  .chip {
    flex: 0 0 auto; border: 2px solid var(--blue-soft); background: #fff; color: var(--ink);
    border-radius: 10px; padding: 7px 12px; font-size: 13px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: transform .15s ease; white-space: nowrap;
  }
  .chip:active { transform: scale(.95); }
  .chip.sel { border-color: var(--ink); background: var(--ink); color: #fff; }

  .banner {
    position: sticky; top: 8px; z-index: 5; background: var(--ink); color: #fff;
    border-radius: 12px; padding: 10px 14px; margin: 8px 0 10px; min-height: 44px;
    display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 14px rgba(22,51,110,.25);
  }
  .banner .num {
    background: var(--sun); color: var(--ink); border-radius: 8px;
    font-weight: 800; font-size: 13px; padding: 2px 8px; flex-shrink: 0;
  }
  .banner .clue { font-size: 15px; font-weight: 600; }
  .banner .hintText { font-size: 14px; opacity: .85; }

  .boardWrap { display: flex; justify-content: center; }
  #board { display: grid; gap: 2px; background: var(--board); padding: 4px; border-radius: 10px; }
  .cell {
    position: relative; background: var(--cell); border: 2px solid transparent; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; cursor: pointer; user-select: none;
  }
  .cell.spacer { background: transparent; cursor: default; }
  .cell.inword { background: var(--blue-soft); border-color: var(--blue); }
  .cell.active { border-color: var(--sun); }
  .cell.ok { background: var(--ok-bg); }
  .cell.bad { background: var(--bad-bg); color: var(--bad); }
  body.solvedState .cell:not(.spacer) { background: var(--ok-bg); }
  .cell .n {
    position: absolute; top: 1px; left: 3px; font-weight: 800; color: var(--blue);
    pointer-events: none; line-height: 1;
  }

  #success {
    display: none; background: var(--sun); color: var(--ink); border-radius: 12px;
    padding: 12px 16px; margin: 12px 0; text-align: center; font-weight: 800; font-size: 17px;
    animation: pop .3s ease;
  }
  body.solvedState #success { display: block; }
  @keyframes pop { from { transform: scale(.9); opacity: 0 } to { transform: scale(1); opacity: 1 } }

  .actions { display: flex; gap: 8px; margin: 12px 0 18px; }
  .actions button {
    flex: 1; border-radius: 12px; padding: 12px 0; font-size: 15px; font-weight: 800;
    font-family: inherit; cursor: pointer;
  }
  .btnPrimary { background: var(--ink); color: #fff; border: 2px solid var(--ink); }
  .btnGhost { background: #fff; color: var(--ink); border: 2px solid var(--ink); }

  h2 {
    font-family: 'Yeseva One', serif; font-size: 18px; margin: 0 0 6px; font-weight: 400;
    border-bottom: 2px solid var(--blue-soft); padding-bottom: 4px;
  }
  section { margin-bottom: 14px; }
  .clueItem {
    display: flex; gap: 8px; align-items: baseline; width: 100%; background: transparent;
    border: none; border-radius: 8px; padding: 6px 8px; font-family: inherit; font-size: 14px;
    color: var(--ink); text-align: left; cursor: pointer;
  }
  .clueItem b { flex-shrink: 0; color: var(--blue); }
  .clueItem.sel { background: var(--blue-soft); }
  .clueItem.done { opacity: .45; text-decoration: line-through; }
  .clueItem .len { opacity: .5; }

  footer { font-size: 12px; text-align: center; opacity: .55; margin-top: 20px; }

  #kbd {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: var(--ink); padding: 8px 4px calc(10px + env(safe-area-inset-bottom, 0px));
    box-shadow: 0 -4px 14px rgba(22,51,110,.3);
  }
  body.mobile #kbd { display: block; }
  .krow { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
  .key {
    flex: 1; max-width: 44px; height: 42px; border: none; border-radius: 7px;
    background: #fff; color: var(--ink); font-size: 17px; font-weight: 800;
    font-family: inherit; touch-action: manipulation; padding: 0; cursor: pointer;
  }
  .key.back { flex: 1.6; max-width: 72px; background: var(--sun); }
</style>
</head>

</div>

// Mezcla: words from every category, clue prefixed with the category name
(function () {
  const seen = new Set();
  const mezcla = [];
  for (const [name, list] of Object.entries(THEMES)) {
    for (const [w, clue] of list) {
      if (seen.has(w)) continue;
      seen.add(w);
      mezcla.push([w, name + " — " + clue]);
    }
  }
  THEMES["Mezcla"] = mezcla;
})();

const ICONS = {
  "Los animales": "🐾", "La comida": "🥘", "La casa": "🏠", "El cuerpo": "🖐",
  "La familia": "👪", "La naturaleza": "🌿", "La ropa": "👕", "Los colores": "🎨",

};

// ------------------------------------------------------------------
// Generator
// ------------------------------------------------------------------
const SIZE = 17;
const key = (r, c) => r + "," + c;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function canPlace(grid, word, r0, c0, dr, dc) {
  const endR = r0 + (word.length - 1) * dr;
  const endC = c0 + (word.length - 1) * dc;
  if (r0 < 0 || c0 < 0 || endR >= SIZE || endC >= SIZE) return null;
  if (grid.has(key(r0 - dr, c0 - dc))) return null;
  if (grid.has(key(endR + dr, endC + dc))) return null;
  let crossings = 0;
  for (let i = 0; i < word.length; i++) {
    const r = r0 + i * dr, c = c0 + i * dc;
    const existing = grid.get(key(r, c));
    if (existing) {
      if (existing !== word[i]) return null;
      crossings++;
    } else {
      if (grid.has(key(r + dc, c + dr)) || grid.has(key(r - dc, c - dr))) return null;
    }
  }
  return crossings === 0 ? null : crossings;
}

function generatePuzzle(themeWords, target = 10) {
  const pool = shuffle(themeWords)
    .slice(0, Math.min(themeWords.length, target + 3))
    .sort((a, b) => b[0].length - a[0].length);
  const grid = new Map();
  const placed = [];

  for (const [word, clue] of pool) {
    if (placed.length >= target) break;
    if (placed.length === 0) {
      const r = Math.floor(SIZE / 2);
      const c = Math.floor((SIZE - word.length) / 2);
      for (let i = 0; i < word.length; i++) grid.set(key(r, c + i), word[i]);
      placed.push({ word, clue, r, c, dr: 0, dc: 1 });
      continue;
    }
    let best = null;
    for (const [k, letter] of grid) {
      const [gr, gc] = k.split(",").map(Number);
      for (let i = 0; i < word.length; i++) {
        if (word[i] !== letter) continue;
        for (const [dr, dc] of [[0, 1], [1, 0]]) {
          const r0 = gr - i * dr, c0 = gc - i * dc;
          const score = canPlace(grid, word, r0, c0, dr, dc);
          if (score !== null && (!best || score > best.score || (score === best.score && Math.random() < 0.4))) {
            best = { r: r0, c: c0, dr, dc, score };
          }
        }
      }
    }
    if (best) {
      for (let i = 0; i < word.length; i++)
        grid.set(key(best.r + i * best.dr, best.c + i * best.dc), word[i]);
      placed.push({ word, clue, r: best.r, c: best.c, dr: best.dr, dc: best.dc });
    }
  }

  let minR = SIZE, maxR = 0, minC = SIZE, maxC = 0;
  for (const k of grid.keys()) {
    const [r, c] = k.split(",").map(Number);
    minR = Math.min(minR, r); maxR = Math.max(maxR, r);
    minC = Math.min(minC, c); maxC = Math.max(maxC, c);
  }
  const cells = new Map();
  for (const [k, v] of grid) {
    const [r, c] = k.split(",").map(Number);
    cells.set(key(r - minR, c - minC), v);
  }
  const words = placed.map((p) => {
    const r = p.r - minR, c = p.c - minC;
    const wcells = [];
    for (let i = 0; i < p.word.length; i++) wcells.push(key(r + i * p.dr, c + i * p.dc));
    return { ...p, r, c, cells: wcells, dir: p.dc === 1 ? "H" : "V" };
  });
  const starts = new Map();
  let num = 0;
  const rows = maxR - minR + 1, cols = maxC - minC + 1;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const k = key(r, c);
      if (words.some((w) => w.cells[0] === k)) { num++; starts.set(k, num); }
    }
  for (const w of words) w.num = starts.get(w.cells[0]);
  words.sort((a, b) => a.num - b.num);
  return { cells, words, rows, cols, starts };
}

// ------------------------------------------------------------------
// Game state & UI
// ------------------------------------------------------------------
const isMobile = matchMedia("(pointer: coarse)").matches;
if (isMobile) document.body.classList.add("mobile");
document.getElementById("ver").textContent = VERSION;

const themeNames = Object.keys(THEMES);
let theme = themeNames[0];
let puzzle = null;
let entries = {};   // key -> letter
let status = {};    // key -> "ok" | "bad"
let active = null;  // { key, dir }
let solved = false;

const cellEls = {};       // key -> element
const clueEls = {};       // num+dir -> element
const $ = (id) => document.getElementById(id);

function wordAt(k, dir) {
  return puzzle.words.find((w) => w.dir === dir && w.cells.includes(k)) || null;
}

function activeWord() {
  if (!active) return null;
  return wordAt(active.key, active.dir) || wordAt(active.key, active.dir === "H" ? "V" : "H");
}

// ---------- Rendering ----------
function renderChips() {
  const box = $("chips");
  box.innerHTML = "";
  for (const t of themeNames) {
    const b = document.createElement("button");
    b.className = "chip" + (t === theme ? " sel" : "");
    b.textContent = (ICONS[t] || "") + " " + t;
    b.onclick = () => newPuzzle(t);
    box.appendChild(b);
  }
}

function cellSizePx() {
  const w = document.querySelector(".boardWrap").clientWidth;
  return Math.min(40, Math.floor((w - 8 - (puzzle.cols - 1) * 2) / puzzle.cols));
}

function buildBoard() {
  const board = $("board");
  board.innerHTML = "";
  for (const k in cellEls) delete cellEls[k];
  const sz = cellSizePx();
  board.style.gridTemplateColumns = `repeat(${puzzle.cols}, ${sz}px)`;
  board.style.gridTemplateRows = `repeat(${puzzle.rows}, ${sz}px)`;
  for (let r = 0; r < puzzle.rows; r++) {
    for (let c = 0; c < puzzle.cols; c++) {
      const k = key(r, c);
      const div = document.createElement("div");
      if (!puzzle.cells.has(k)) {
        div.className = "cell spacer";
      } else {
        div.className = "cell";
        div.style.fontSize = Math.max(14, sz * 0.5) + "px";
        if (puzzle.starts.has(k)) {
          const n = document.createElement("span");
          n.className = "n";
          n.style.fontSize = Math.max(8, sz * 0.26) + "px";
          n.textContent = puzzle.starts.get(k);
          div.appendChild(n);
        }
        const letter = document.createElement("span");
        letter.className = "letter";
        div.appendChild(letter);
        div.onclick = () => selectCell(k);
        cellEls[k] = div;
      }
      board.appendChild(div);
    }
  }
}

function renderClues() {
  for (const [dir, boxId] of [["H", "cluesH"], ["V", "cluesV"]]) {
    const box = $(boxId);
    box.innerHTML = "";
    for (const w of puzzle.words.filter((x) => x.dir === dir)) {
      const b = document.createElement("button");
      b.className = "clueItem";
      b.innerHTML = `<b>${w.num}.</b><span>${w.clue} <span class="len">(${w.word.length})</span></span>`;
      b.onclick = () => { setActive(w.cells[0], w.dir); };
      clueEls[w.num + dir] = b;
      box.appendChild(b);
    }
  }
}

function updateAll() {
  document.body.classList.toggle("solvedState", solved);
  const aw = activeWord();
  const inWord = new Set(aw ? aw.cells : []);

  for (const [k, el] of Object.entries(cellEls)) {
    el.classList.toggle("inword", inWord.has(k));
    el.classList.toggle("active", !!active && active.key === k);
    el.classList.toggle("ok", status[k] === "ok");
    el.classList.toggle("bad", status[k] === "bad");
    el.querySelector(".letter").textContent = entries[k] || "";
  }

  const banner = $("banner");
  if (aw) {
    banner.innerHTML =
      `<span class="num">${aw.num} ${aw.dir === "H" ? "→" : "↓"}</span>` +
      `<span class="clue"></span>`;
    banner.querySelector(".clue").textContent = aw.clue;
  } else {
    banner.innerHTML = `<span class="hintText">Toca una casilla para empezar</span>`;
  }

  for (const w of puzzle.words) {
    const el = clueEls[w.num + w.dir];
    const done = w.cells.every((ck) => entries[ck] === puzzle.cells.get(ck));
    el.classList.toggle("done", done);
    el.classList.toggle("sel", aw === w);
  }
}

// ---------- Interaction ----------
function setActive(k, dir) {
  active = { key: k, dir };
  updateAll();
  if (isMobile && cellEls[k]) cellEls[k].scrollIntoView({ block: "center", behavior: "smooth" });
}

function selectCell(k) {
  let dir;
  if (active && active.key === k) {
    dir = active.dir === "H" ? "V" : "H";
    if (!wordAt(k, dir)) dir = active.dir;
  } else {
    const prevDir = active ? active.dir : "H";
    dir = wordAt(k, prevDir) ? prevDir : wordAt(k, "H") ? "H" : "V";
  }
  setActive(k, dir);
}

function afterFill(k) {
  // all cells filled? -> check
  const allFilled = [...puzzle.cells.keys()].every((ck) => entries[ck]);
  if (allFilled) {
    const allRight = [...puzzle.cells.entries()].every(([ck, sol]) => entries[ck] === sol);
    solved = allRight;
    if (!allRight) {
      status = {};
      for (const [ck, sol] of puzzle.cells) status[ck] = entries[ck] === sol ? "ok" : "bad";
    }
  }
  // advance, skipping cells that are already filled
  let dir = active ? active.dir : null;
  if (!dir || !wordAt(k, dir)) dir = wordAt(k, "H") ? "H" : "V";
  const w = wordAt(k, dir);
  if (w) {
    let i = w.cells.indexOf(k) + 1;
    while (i < w.cells.length && entries[w.cells[i]]) i++;
    if (i < w.cells.length) { setActive(w.cells[i], dir); return; }
  }
  updateAll();
}

function typeChar(ch) {
  if (!active) return;
  ch = ch.toUpperCase();
  if (!/^[A-ZÑ]$/.test(ch)) return;
  const k = active.key;
  entries[k] = ch;
  delete status[k];
  afterFill(k);
}

function doBackspace() {
  if (!active) return;
  const k = active.key;
  if (entries[k]) {
    delete entries[k];
    delete status[k];
    updateAll();
  } else {
    const w = wordAt(k, active.dir);
    if (!w) return;
    const i = w.cells.indexOf(k) - 1;
    if (i >= 0) {
      const pk = w.cells[i];
      delete entries[pk];
      delete status[pk];
      setActive(pk, active.dir);
    }
  }
}

function moveArrow(dir, delta) {
  if (!active) return;
  const k = active.key;
  const w = wordAt(k, dir);
  if (!w) { setActive(k, dir); return; }
  const i = w.cells.indexOf(k) + delta;
  if (i >= 0 && i < w.cells.length) setActive(w.cells[i], dir);
  else setActive(k, dir);
}

function check() {
  status = {};
  for (const [ck, sol] of puzzle.cells) {
    if (entries[ck]) status[ck] = entries[ck] === sol ? "ok" : "bad";
  }
  updateAll();
}

function hint() {
  let k = active ? active.key : [...puzzle.cells.keys()].find((ck) => !entries[ck]);
  if (!k) return;
  if (!active) setActive(k, wordAt(k, "H") ? "H" : "V");
  entries[k] = puzzle.cells.get(k);
  status[k] = "ok";
  afterFill(k);
}

function hasProgress() {
  return !!puzzle && !solved && Object.keys(entries).length > 0;
}

function newPuzzle(t = theme) {
  if (hasProgress() &&
      !confirm("Perderás el progreso de este crucigrama. ¿Quieres continuar?")) return;
  theme = t;
  puzzle = generatePuzzle(THEMES[t]);
  entries = {}; status = {}; active = null; solved = false;
  renderChips();
  buildBoard();
  renderClues();
  updateAll();
}

// ---------- Input: hardware keyboard (desktop) ----------
document.addEventListener("keydown", (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "Backspace") { e.preventDefault(); doBackspace(); }
  else if (e.key === "ArrowRight") { e.preventDefault(); moveArrow("H", 1); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); moveArrow("H", -1); }
  else if (e.key === "ArrowDown") { e.preventDefault(); moveArrow("V", 1); }
  else if (e.key === "ArrowUp") { e.preventDefault(); moveArrow("V", -1); }
  else if (/^[a-zñA-ZÑ]$/.test(e.key)) { e.preventDefault(); typeChar(e.key); }
});

// ---------- Input: on-screen keyboard (mobile) ----------
(function buildKeyboard() {
  const kbd = $("kbd");
  for (const row of ["QWERTYUIOP", "ASDFGHJKLÑ", "ZXCVBNM⌫"]) {
    const div = document.createElement("div");
    div.className = "krow";
    for (const ch of row) {
      const b = document.createElement("button");
      b.className = "key" + (ch === "⌫" ? " back" : "");
      b.textContent = ch;
      b.onclick = () => (ch === "⌫" ? doBackspace() : typeChar(ch));
      div.appendChild(b);
    }
    kbd.appendChild(div);
  }
})();

$("btnCheck").onclick = check;
$("btnHint").onclick = hint;
$("btnNew").onclick = () => newPuzzle();

window.addEventListener("resize", () => { if (puzzle) { buildBoard(); updateAll(); } });

// Warn before leaving the page with an unfinished puzzle
window.addEventListener("beforeunload", (e) => {
  if (hasProgress()) { e.preventDefault(); e.returnValue = ""; }
});

// Service worker for offline use (optional, fails silently without sw.js)
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

newPuzzle(theme);
